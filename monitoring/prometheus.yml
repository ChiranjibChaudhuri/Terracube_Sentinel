# TerraCube Sentinel — Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ─── Prometheus self-monitoring ──────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ─── MinIO (natively exposes Prometheus metrics) ────────────────────────
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]
    scrape_interval: 30s

  # ─── Grafana (natively exposes /metrics) ────────────────────────────────
  - job_name: grafana
    static_configs:
      - targets: ["grafana:3002"]
    scrape_interval: 30s

  # ─── Loki (natively exposes /metrics) ──────────────────────────────────
  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics
    scrape_interval: 30s

  # ─── Dagster Webserver (health endpoint) ────────────────────────────
  - job_name: dagster
    metrics_path: /server_info
    static_configs:
      - targets: ["dagster-webserver:3000"]
    scrape_interval: 60s

  # ─── AI Agents (FastAPI health check) ──────────────────────────────
  - job_name: agents
    metrics_path: /health
    static_configs:
      - targets: ["agents:8001"]
    scrape_interval: 30s

  # ─── NOTE: The following services require additional exporters ──────────
  # To enable PostgreSQL metrics, add postgres_exporter sidecar:
  #   image: prometheuscommunity/postgres-exporter
  #   environment:
  #     DATA_SOURCE_NAME: "postgresql://user:pass@postgres:5432/sentinel?sslmode=disable"
  #
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # To enable Valkey/Redis metrics, add redis_exporter sidecar:
  #   image: oliver006/redis_exporter
  #   environment:
  #     REDIS_ADDR: "valkey:6379"
  #     REDIS_PASSWORD: "${VALKEY_PASSWORD}"
  #
  # - job_name: valkey
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # Keycloak metrics (requires metrics-enabled config in production):
  # - job_name: keycloak
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["keycloak:8180"]

  # Elasticsearch (requires prometheus exporter plugin):
  # - job_name: elasticsearch
  #   metrics_path: /_prometheus/metrics
  #   static_configs:
  #     - targets: ["openmetadata-elasticsearch:9200"]

  # TypeDB does not expose Prometheus metrics natively.
  # Dagster webserver does not expose /metrics by default.
  # Agents FastAPI requires prometheus-fastapi-instrumentator for /metrics.
