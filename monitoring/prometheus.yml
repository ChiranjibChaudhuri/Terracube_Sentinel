# TerraCube Sentinel — Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ─── Prometheus self-monitoring ──────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ─── PostgreSQL (requires postgres_exporter sidecar in production) ───────
  - job_name: postgres
    static_configs:
      - targets: ["postgres:5432"]
    metrics_path: /metrics
    scrape_interval: 30s

  # ─── MinIO ──────────────────────────────────────────────────────────────
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]
    scrape_interval: 30s

  # ─── Valkey / Redis-compatible ──────────────────────────────────────────
  - job_name: valkey
    static_configs:
      - targets: ["valkey:6379"]
    scrape_interval: 30s

  # ─── Keycloak ──────────────────────────────────────────────────────────
  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ["keycloak:8180"]
    scrape_interval: 30s

  # ─── OpenMetadata ──────────────────────────────────────────────────────
  - job_name: openmetadata
    metrics_path: /api/v1/system/version
    static_configs:
      - targets: ["openmetadata:8585"]
    scrape_interval: 60s

  # ─── Grafana (port 3002, not 3000) ─────────────────────────────────────
  - job_name: grafana
    static_configs:
      - targets: ["grafana:3002"]
    scrape_interval: 30s

  # ─── Loki ──────────────────────────────────────────────────────────────
  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics
    scrape_interval: 30s

  # ─── Elasticsearch (OpenMetadata search backend) ───────────────────────
  - job_name: elasticsearch
    metrics_path: /_prometheus/metrics
    static_configs:
      - targets: ["openmetadata-elasticsearch:9200"]
    scrape_interval: 30s

  # ─── TypeDB ────────────────────────────────────────────────────────────
  - job_name: typedb
    static_configs:
      - targets: ["typedb:1729"]
    scrape_interval: 30s

  # ─── Dagster Webserver ─────────────────────────────────────────────────
  - job_name: dagster
    static_configs:
      - targets: ["dagster-webserver:3000"]
    scrape_interval: 30s

  # ─── AI Agents (FastAPI) ───────────────────────────────────────────────
  - job_name: agents
    static_configs:
      - targets: ["agents:8001"]
    scrape_interval: 30s
