version: "3.8"

services:
  # ── PostgreSQL for Dagster run/event storage ─────────────────────────
  dagster-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    ports:
      - "5433:5432"
    volumes:
      - dagster-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Dagster webserver (UI) ───────────────────────────────────────────
  dagster-webserver:
    build:
      context: ./dagster
      dockerfile: ../Dockerfile.dagster
    command: >
      dagster-webserver
        -h 0.0.0.0
        -p 3000
        -w workspace.yaml
    ports:
      - "3000:3000"
    environment:
      DAGSTER_POSTGRES_HOST: dagster-postgres
      DAGSTER_POSTGRES_PORT: "5432"
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_POSTGRES_DB: dagster
      FOUNDRY_API_URL: "${FOUNDRY_API_URL:-http://host.docker.internal:8080/api/v1}"
      FOUNDRY_API_TOKEN: "${FOUNDRY_API_TOKEN:-}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-http://host.docker.internal:9000}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      CDS_API_KEY: "${CDS_API_KEY:-}"
      NASA_FIRMS_MAP_KEY: "${NASA_FIRMS_MAP_KEY:-}"
    volumes:
      - ./dagster:/opt/dagster/app
    depends_on:
      dagster-postgres:
        condition: service_healthy

  # ── Dagster daemon (schedules, sensors, run queue) ───────────────────
  dagster-daemon:
    build:
      context: ./dagster
      dockerfile: ../Dockerfile.dagster
    command: dagster-daemon run
    environment:
      DAGSTER_POSTGRES_HOST: dagster-postgres
      DAGSTER_POSTGRES_PORT: "5432"
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_POSTGRES_DB: dagster
      FOUNDRY_API_URL: "${FOUNDRY_API_URL:-http://host.docker.internal:8080/api/v1}"
      FOUNDRY_API_TOKEN: "${FOUNDRY_API_TOKEN:-}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-http://host.docker.internal:9000}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      CDS_API_KEY: "${CDS_API_KEY:-}"
      NASA_FIRMS_MAP_KEY: "${NASA_FIRMS_MAP_KEY:-}"
    volumes:
      - ./dagster:/opt/dagster/app
    depends_on:
      dagster-postgres:
        condition: service_healthy

volumes:
  dagster-pg-data:
