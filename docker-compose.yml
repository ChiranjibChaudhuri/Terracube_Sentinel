# TerraCube Sentinel — Docker Compose Infrastructure
# Usage: cp .env.example .env && docker compose up -d

services:
  # ─── PostgreSQL 17 with PostGIS + pgvector + AGE ───────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: sentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sentinel

  # ─── TypeDB ────────────────────────────────────────────────────────────────
  typedb:
    image: typedb/typedb:latest
    container_name: sentinel-typedb
    restart: unless-stopped
    ports:
      - "${TYPEDB_PORT:-1729}:1729"
    volumes:
      - typedb_data:/opt/typedb-all-linux-x86_64/server/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1729'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sentinel

  # ─── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio
    container_name: sentinel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - sentinel

  # ─── Valkey (Redis-compatible event bus / cache) ───────────────────────────
  valkey:
    image: valkey/valkey:8
    container_name: sentinel-valkey
    restart: unless-stopped
    command: valkey-server --requirepass ${VALKEY_PASSWORD}
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sentinel

  # ─── Keycloak (OIDC / IAM) ────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: sentinel-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HTTP_PORT: 8180
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT:-8180}:8180"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8180 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200\\|UP'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - sentinel

  # ─── OpenMetadata (Data Catalog) ───────────────────────────────────────────
  openmetadata-mysql:
    image: mysql:8.4
    container_name: sentinel-om-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${OM_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: openmetadata_db
      MYSQL_USER: ${OM_MYSQL_USER}
      MYSQL_PASSWORD: ${OM_MYSQL_PASSWORD}
    ports:
      - "${OM_MYSQL_PORT:-3306}:3306"
    volumes:
      - om_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${OM_MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sentinel

  openmetadata-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: sentinel-om-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${OM_ES_PORT:-9200}:9200"
    volumes:
      - om_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - sentinel

  openmetadata:
    image: docker.getcollate.io/openmetadata/server:1.6.2
    container_name: sentinel-openmetadata
    restart: unless-stopped
    environment:
      OPENMETADATA_CLUSTER_NAME: sentinel
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      DB_SCHEME: mysql
      DB_HOST: openmetadata-mysql
      DB_PORT: 3306
      DB_USER: ${OM_MYSQL_USER}
      DB_USER_PASSWORD: ${OM_MYSQL_PASSWORD}
      DB_SCHEME_TYPE: mysql
      SEARCH_TYPE: elasticsearch
      ELASTICSEARCH_HOST: openmetadata-elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
      AUTHENTICATION_PROVIDER: no-auth
      AUTHORIZER_ADMIN_PRINCIPALS: "[admin]"
      AUTHORIZER_PRINCIPAL_DOMAIN: "open-metadata.org"
    ports:
      - "${OM_PORT:-8585}:8585"
    depends_on:
      openmetadata-mysql:
        condition: service_healthy
      openmetadata-elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8585/api/v1/system/version || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - sentinel

  # ─── Prometheus (Metrics) ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus
    container_name: sentinel-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - sentinel

  # ─── Grafana (Dashboards) — port 3002 to avoid conflict with Dagster ──────
  grafana:
    image: grafana/grafana
    container_name: sentinel-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3002"
    ports:
      - "${GRAFANA_PORT:-3002}:3002"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3002/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - sentinel

  # ─── Loki (Log Aggregation) ────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.3.2
    container_name: sentinel-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sentinel

  # ─── Frontend (React SPA via Nginx) ────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: sentinel-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - sentinel

  # ─── Apache Superset (BI Dashboards) ───────────────────────────────────────
  superset:
    image: apache/superset
    container_name: sentinel-superset
    restart: unless-stopped
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-terracube-sentinel-secret-key-change-me}
      SUPERSET_LOAD_EXAMPLES: "no"
    ports:
      - "8088:8088"
    networks:
      - sentinel

  # ─── Dagster PostgreSQL (run/event storage) ────────────────────────────────
  dagster-postgres:
    image: postgres:17-alpine
    container_name: sentinel-dagster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    ports:
      - "5433:5432"
    volumes:
      - dagster_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sentinel

  # ─── Dagster Webserver (UI) — port 3000 ────────────────────────────────────
  dagster-webserver:
    build:
      context: ./dagster
      dockerfile: ../Dockerfile.dagster
    container_name: sentinel-dagster-webserver
    restart: unless-stopped
    command: >
      dagster-webserver
        -h 0.0.0.0
        -p 3000
        -w workspace.yaml
    ports:
      - "3000:3000"
    environment:
      DAGSTER_POSTGRES_HOST: dagster-postgres
      DAGSTER_POSTGRES_PORT: "5432"
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_POSTGRES_DB: dagster
      FOUNDRY_API_URL: "${FOUNDRY_API_URL:-http://host.docker.internal:8080/api/v1}"
      FOUNDRY_API_TOKEN: "${FOUNDRY_API_TOKEN:-}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-http://host.docker.internal:9000}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      CDS_API_KEY: "${CDS_API_KEY:-}"
      NASA_FIRMS_MAP_KEY: "${NASA_FIRMS_MAP_KEY:-}"
    volumes:
      - ./dagster:/opt/dagster/app
    depends_on:
      dagster-postgres:
        condition: service_healthy
    networks:
      - sentinel

  # ─── Dagster Daemon (schedules, sensors, run queue) ────────────────────────
  dagster-daemon:
    build:
      context: ./dagster
      dockerfile: ../Dockerfile.dagster
    container_name: sentinel-dagster-daemon
    restart: unless-stopped
    command: dagster-daemon run
    environment:
      DAGSTER_POSTGRES_HOST: dagster-postgres
      DAGSTER_POSTGRES_PORT: "5432"
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: dagster
      DAGSTER_POSTGRES_DB: dagster
      FOUNDRY_API_URL: "${FOUNDRY_API_URL:-http://host.docker.internal:8080/api/v1}"
      FOUNDRY_API_TOKEN: "${FOUNDRY_API_TOKEN:-}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-http://host.docker.internal:9000}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      CDS_API_KEY: "${CDS_API_KEY:-}"
      NASA_FIRMS_MAP_KEY: "${NASA_FIRMS_MAP_KEY:-}"
    volumes:
      - ./dagster:/opt/dagster/app
    depends_on:
      dagster-postgres:
        condition: service_healthy
    networks:
      - sentinel

  # ─── AI Agents (FastAPI) ───────────────────────────────────────────────────
  agents:
    build: ./agents
    container_name: sentinel-agents
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      FOUNDRY_API_URL: "${FOUNDRY_API_URL:-http://host.docker.internal:8080/api/v1}"
      FOUNDRY_API_TOKEN: "${FOUNDRY_API_TOKEN:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
    networks:
      - sentinel

volumes:
  postgres_data:
  typedb_data:
  minio_data:
  valkey_data:
  om_mysql_data:
  om_es_data:
  prometheus_data:
  grafana_data:
  loki_data:
  dagster_pg_data:

networks:
  sentinel:
    driver: bridge
