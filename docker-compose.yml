# TerraCube Sentinel — Docker Compose Infrastructure (Minimal)
# Usage: cp .env.example .env && docker compose up -d

services:
  # ─── TypeDB (Type-safe ontology storage via Foundry SPI) ─────────────────
  typedb:
    image: typedb/typedb:2.28.3
    container_name: sentinel-typedb
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TYPEDB_PORT:-1729}:1729"
    volumes:
      - typedb_data:/opt/typedb-all-linux-x86_64/server/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1729'""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - sentinel

  # ─── Valkey (Redis-compatible event bus / cache) ───────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    container_name: sentinel-valkey
    restart: unless-stopped
    command: valkey-server --requirepass ${VALKEY_PASSWORD}
    ports:
      - "127.0.0.1:${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - sentinel

  # ─── Frontend (React SPA via Nginx) ────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: sentinel-frontend
    restart: unless-stopped
    ports:
      - "5173:8080"
    depends_on:
      agents:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
    networks:
      - sentinel

  # ─── Dagster PostgreSQL (run/event storage) ────────────────────────────────
  dagster-postgres:
    image: postgres:17-alpine
    container_name: sentinel-dagster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DAGSTER_POSTGRES_USER:-dagster}
      POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD:?DAGSTER_POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${DAGSTER_POSTGRES_DB:-dagster}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - dagster_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - sentinel

  # ─── Dagster Webserver (UI + API) ──────────────────────────────────────────
  dagster-webserver:
    build:
      context: ./dagster
      dockerfile: ../Dockerfile.dagster
    container_name: sentinel-dagster-webserver
    restart: unless-stopped
    command: >
      dagster-webserver
        -h 0.0.0.0
        -p 3000
        -w workspace.yaml
    ports:
      - "3000:3000"
    environment:
      DAGSTER_POSTGRES_HOST: dagster-postgres
      DAGSTER_POSTGRES_PORT: "5432"
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER:-dagster}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD:?DAGSTER_POSTGRES_PASSWORD must be set}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB:-dagster}
      FOUNDRY_API_URL: "${FOUNDRY_API_URL:-http://host.docker.internal:8080/api/v1}"
      FOUNDRY_GRAPHQL_URL: "${FOUNDRY_GRAPHQL_URL:-http://host.docker.internal:8080/graphql}"
      FOUNDRY_API_TOKEN: "${FOUNDRY_API_TOKEN:-}"
      FOUNDRY_TOKEN: "${FOUNDRY_TOKEN:-}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-http://host.docker.internal:9000}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-terracube-satellite}"
      AWS_OPEN_DATA_REGION: "${AWS_OPEN_DATA_REGION:-us-west-2}"
      CDS_API_URL: "${CDS_API_URL:-https://cds.climate.copernicus.eu/api}"
      CDS_API_KEY: "${CDS_API_KEY:-}"
      NASA_FIRMS_MAP_KEY: "${NASA_FIRMS_MAP_KEY:-}"
      FIRMS_API_KEY: "${FIRMS_API_KEY:-DEMO_KEY}"
      WAQI_API_TOKEN: "${WAQI_API_TOKEN:-}"
      AIS_SOURCES: "${AIS_SOURCES:-aishub,aisstream,gfw}"
      AIS_API_URL: "${AIS_API_URL:-https://data.aishub.net/ws.php}"
      AIS_API_KEY: "${AIS_API_KEY:-}"
      AISSTREAM_API_KEY: "${AISSTREAM_API_KEY:-}"
      AISSTREAM_WS_URL: "${AISSTREAM_WS_URL:-wss://stream.aisstream.io/v0/stream}"
      AISSTREAM_SNAPSHOT_SECONDS: "${AISSTREAM_SNAPSHOT_SECONDS:-30}"
      AISSTREAM_MAX_MESSAGES: "${AISSTREAM_MAX_MESSAGES:-5000}"
      AISSTREAM_BBOX: "${AISSTREAM_BBOX:-}"
      AISSTREAM_BBOX_FORMAT: "${AISSTREAM_BBOX_FORMAT:-corners}"
      GFW_API_TOKEN: "${GFW_API_TOKEN:-}"
      GFW_API_URL: "${GFW_API_URL:-https://gateway.api.globalfishingwatch.org/v3/4wings/report}"
      GFW_DATASET: "${GFW_DATASET:-public-global-presence:latest}"
      GFW_BBOX: "${GFW_BBOX:-}"
      GFW_LOOKBACK_HOURS: "${GFW_LOOKBACK_HOURS:-24}"
      GFW_MAX_RECORDS: "${GFW_MAX_RECORDS:-1000}"
      REDIS_URL: "redis://:${VALKEY_PASSWORD}@valkey:6379/0"
      MAX_CLOUD_COVER: "${MAX_CLOUD_COVER:-20}"
      STAC_LOOKBACK_HOURS: "${STAC_LOOKBACK_HOURS:-6}"
      STAC_MAX_ITEMS: "${STAC_MAX_ITEMS:-50}"
      SATELLITE_LLM_MAX_ITEMS: "${SATELLITE_LLM_MAX_ITEMS:-10}"
      SATELLITE_MAX_ASSETS_PER_SCENE: "${SATELLITE_MAX_ASSETS_PER_SCENE:-5}"
      SATELLITE_ASSET_STORAGE_MODE: "${SATELLITE_ASSET_STORAGE_MODE:-reference}"
      SATELLITE_ASSET_KEYS: "${SATELLITE_ASSET_KEYS:-visual,red,green,blue,nir,nir08,swir16,swir22,scl,B04_10m,B08_10m,TCI_10m}"
      OVERPASS_URL: "${OVERPASS_URL:-https://overpass-api.de/api/interpreter}"
      OSM_BBOX: "${OSM_BBOX:--33.9,18.4,-33.7,18.7}"
      LLM_BACKEND: "${LLM_BACKEND:-openai}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.z.ai/api/coding/paas/v4}"
      LLM_MODEL: "${LLM_MODEL:-glm-5-turbo}"
      ZAI_API_KEY: "${ZAI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      AI_ENABLE_LLM_CLASSIFICATION: "${AI_ENABLE_LLM_CLASSIFICATION:-true}"
      AI_ENABLE_ANOMALY_DETECTION: "${AI_ENABLE_ANOMALY_DETECTION:-true}"
      AI_ENABLE_AUTO_MAPPING: "${AI_ENABLE_AUTO_MAPPING:-true}"
    volumes:
      - ./dagster:/opt/dagster/app:ro
    depends_on:
      dagster-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/server_info || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - sentinel

  # ─── Dagster Daemon (schedules, sensors, run queue) ────────────────────────
  dagster-daemon:
    build:
      context: ./dagster
      dockerfile: ../Dockerfile.dagster
    container_name: sentinel-dagster-daemon
    restart: unless-stopped
    command: dagster-daemon run
    environment:
      DAGSTER_POSTGRES_HOST: dagster-postgres
      DAGSTER_POSTGRES_PORT: "5432"
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER:-dagster}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD:?DAGSTER_POSTGRES_PASSWORD must be set}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB:-dagster}
      FOUNDRY_API_URL: "${FOUNDRY_API_URL:-http://host.docker.internal:8080/api/v1}"
      FOUNDRY_GRAPHQL_URL: "${FOUNDRY_GRAPHQL_URL:-http://host.docker.internal:8080/graphql}"
      FOUNDRY_API_TOKEN: "${FOUNDRY_API_TOKEN:-}"
      FOUNDRY_TOKEN: "${FOUNDRY_TOKEN:-}"
      MINIO_ENDPOINT: "${MINIO_ENDPOINT:-http://host.docker.internal:9000}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-terracube-satellite}"
      AWS_OPEN_DATA_REGION: "${AWS_OPEN_DATA_REGION:-us-west-2}"
      CDS_API_URL: "${CDS_API_URL:-https://cds.climate.copernicus.eu/api}"
      CDS_API_KEY: "${CDS_API_KEY:-}"
      NASA_FIRMS_MAP_KEY: "${NASA_FIRMS_MAP_KEY:-}"
      FIRMS_API_KEY: "${FIRMS_API_KEY:-DEMO_KEY}"
      WAQI_API_TOKEN: "${WAQI_API_TOKEN:-}"
      AIS_SOURCES: "${AIS_SOURCES:-aishub,aisstream,gfw}"
      AIS_API_URL: "${AIS_API_URL:-https://data.aishub.net/ws.php}"
      AIS_API_KEY: "${AIS_API_KEY:-}"
      AISSTREAM_API_KEY: "${AISSTREAM_API_KEY:-}"
      AISSTREAM_WS_URL: "${AISSTREAM_WS_URL:-wss://stream.aisstream.io/v0/stream}"
      AISSTREAM_SNAPSHOT_SECONDS: "${AISSTREAM_SNAPSHOT_SECONDS:-30}"
      AISSTREAM_MAX_MESSAGES: "${AISSTREAM_MAX_MESSAGES:-5000}"
      AISSTREAM_BBOX: "${AISSTREAM_BBOX:-}"
      AISSTREAM_BBOX_FORMAT: "${AISSTREAM_BBOX_FORMAT:-corners}"
      GFW_API_TOKEN: "${GFW_API_TOKEN:-}"
      GFW_API_URL: "${GFW_API_URL:-https://gateway.api.globalfishingwatch.org/v3/4wings/report}"
      GFW_DATASET: "${GFW_DATASET:-public-global-presence:latest}"
      GFW_BBOX: "${GFW_BBOX:-}"
      GFW_LOOKBACK_HOURS: "${GFW_LOOKBACK_HOURS:-24}"
      GFW_MAX_RECORDS: "${GFW_MAX_RECORDS:-1000}"
      REDIS_URL: "redis://:${VALKEY_PASSWORD}@valkey:6379/0"
      MAX_CLOUD_COVER: "${MAX_CLOUD_COVER:-20}"
      STAC_LOOKBACK_HOURS: "${STAC_LOOKBACK_HOURS:-6}"
      STAC_MAX_ITEMS: "${STAC_MAX_ITEMS:-50}"
      SATELLITE_LLM_MAX_ITEMS: "${SATELLITE_LLM_MAX_ITEMS:-10}"
      SATELLITE_MAX_ASSETS_PER_SCENE: "${SATELLITE_MAX_ASSETS_PER_SCENE:-5}"
      SATELLITE_ASSET_STORAGE_MODE: "${SATELLITE_ASSET_STORAGE_MODE:-reference}"
      SATELLITE_ASSET_KEYS: "${SATELLITE_ASSET_KEYS:-visual,red,green,blue,nir,nir08,swir16,swir22,scl,B04_10m,B08_10m,TCI_10m}"
      OVERPASS_URL: "${OVERPASS_URL:-https://overpass-api.de/api/interpreter}"
      OSM_BBOX: "${OSM_BBOX:--33.9,18.4,-33.7,18.7}"
      LLM_BACKEND: "${LLM_BACKEND:-openai}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.z.ai/api/coding/paas/v4}"
      LLM_MODEL: "${LLM_MODEL:-glm-5-turbo}"
      ZAI_API_KEY: "${ZAI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      AI_ENABLE_LLM_CLASSIFICATION: "${AI_ENABLE_LLM_CLASSIFICATION:-true}"
      AI_ENABLE_ANOMALY_DETECTION: "${AI_ENABLE_ANOMALY_DETECTION:-true}"
      AI_ENABLE_AUTO_MAPPING: "${AI_ENABLE_AUTO_MAPPING:-true}"
    volumes:
      - ./dagster:/opt/dagster/app:ro
    depends_on:
      dagster-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'dagster-daemon' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - sentinel

  # ─── AI Agents (FastAPI) ───────────────────────────────────────────────────
  agents:
    build:
      context: .
      dockerfile: agents/Dockerfile
    container_name: sentinel-agents
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      FOUNDRY_API_URL: "${FOUNDRY_API_URL:-http://host.docker.internal:8080/api/v1}"
      FOUNDRY_GRAPHQL_URL: "${FOUNDRY_GRAPHQL_URL:-http://host.docker.internal:8080/graphql}"
      FOUNDRY_API_TOKEN: "${FOUNDRY_API_TOKEN:-}"
      FOUNDRY_TOKEN: "${FOUNDRY_TOKEN:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      REST_COUNTRIES_URL: "https://restcountries.com/v3.1"
      REDIS_URL: "redis://:${VALKEY_PASSWORD}@valkey:6379/0"
      ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL:-}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}"
      ALERT_FROM_EMAIL: "${ALERT_FROM_EMAIL:-sentinel@terracube.io}"
      ALERT_TO_EMAILS: "${ALERT_TO_EMAILS:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
    depends_on:
      - valkey
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8001/health\")' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - sentinel

volumes:
  typedb_data:
  valkey_data:
  dagster_pg_data:

networks:
  sentinel:
    driver: bridge
